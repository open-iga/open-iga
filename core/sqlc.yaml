version: 2
sql:
  - engine: "postgresql"
    queries:
      - "./sql/query/*.sql"
    schema:
      - "./sql/migration/*.sql"
    gen:
      go:
        package: "db"
        out: "internal/repository/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

